// ── LOCAL NLP ENGINE (works 100% offline, no API needed) ─────────────
function localNLP(p, q, projId){
  const ctx=getCtx(projId);
  const ql=q.toLowerCase();
  let actions=0;
  const replies=[];

  // ── PENDING ACTION RESOLVER ──────────────────────────────────────────
  // If the assistant asked a clarifying question last turn,
  // this turn is likely the user's answer — resolve it first.
  if(ctx.pendingAction){
    const resolved=resolvePending(p, q, projId, ctx);
    if(resolved!==null){
      setCtx(projId,{pendingAction:null,pendingData:null});
      return resolved;
    }
    // If we couldn't resolve, clear pending and continue normally
    setCtx(projId,{pendingAction:null,pendingData:null});
  }

  // ── NAME EXTRACTOR: handles quoted, natural, possessive phrasings ────
  function extractName(q){
    const SKIP=/^(the|a|an|this|that|it|him|her|them|team|project|task|member|new|old|i|me|we|us)$/i;
    // 1. Quoted name — highest priority: "Josh S" or 'Josh S'
    const quoted=q.match(/["']([A-Za-z]+(?:\s+[A-Za-z.]+)*)["']/);
    if(quoted&&!SKIP.test(quoted[1].trim())) return quoted[1].trim();
    // 2. Possessive: "Josh S's task", "make Josh S the owner"
    const poss=q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)'s\b/)||
               q.match(/(?:make|set)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s+(?:the\s+)?owner/i)||
               q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s+(?:should\s+(?:be\s+)?(?:the\s+)?owner|will\s+handle|is\s+(?:the\s+)?owner)/i);
    if(poss&&!SKIP.test(poss[1].trim())) return poss[1].trim();
    // 3. "add X to the team" — name before "to the team"
    const addTeam=q.match(/(?:add|bring|include)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s+to\s+(?:the\s+)?team/i);
    if(addTeam&&!SKIP.test(addTeam[1].trim())) return addTeam[1].trim();
    // 4. "give it/the task to X" / "pass it to X"
    const give=q.match(/(?:give|hand|pass|send)\s+(?:it\s+|him\s+|this\s+|the\s+task\s+)?to\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)/i);
    if(give&&!SKIP.test(give[1].trim())) return give[1].trim();
    // 5. "his/her name is X"
    const nameIs=q.match(/(?:his|her|their)\s+name\s+is\s+([A-Za-z]+(?:\s+[A-Za-z][a-z]*)*?)(?:\s+who\b|,|\.|$)/i);
    if(nameIs&&!SKIP.test(nameIs[1].trim())) return nameIs[1].trim();
    // 6. "assign X to Y" or "assign ... to Y"
    const assignTo=q.match(/assign\s+(?:\S+\s+){0,8}to\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s*(?:$|,|\.|\s+(?:he|she|they|who|which|is)\b)/i)||
                   q.match(/(?:new\s+)?owner\s+(?:as|is|:)\s*([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s*(?:$|,|\.|\s+(?:who|he|she)\b)/i);
    if(assignTo&&!SKIP.test(assignTo[1].trim())) return assignTo[1].trim();
    // 7. "to X" at end of sentence (fallback)
    const toX=q.match(/\bto\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s*(?:$|,|\.|\s+(?:he|she|they|is|as|and|who|which)\b)/i);
    if(toX&&!SKIP.test(toX[1].trim())) return toX[1].trim();
    return null;
  }

  // ── TASK RESOLVER: finds task from context or name hint ──────────────
  function bestTask(hint){
    if(hint){
      const hl=hint.toLowerCase().trim();
      if(hl.length>3){
        const direct=p.tasks.find(t=>t.text.toLowerCase().includes(hl));
        if(direct) return direct;
        const words=hl.split(/\s+/).filter(w=>w.length>3);
        for(const w of words){
          const f=p.tasks.find(t=>t.text.toLowerCase().includes(w));
          if(f) return f;
        }
      }
    }
    // Fall back to last touched task from context
    if(ctx.lastTaskId){const t=p.tasks.find(t=>t.id===ctx.lastTaskId);if(t)return t;}
    return p.tasks[p.tasks.length-1]||null;
  }

  // ── INTENT DETECTION: flexible multi-pattern matching ───────────────
  const isAddTask    = /\b(add|create|new)\b.{0,25}\btask\b/i.test(q);
  const isAssign     = /\bassign\b|\bgive\b.{0,20}\btask\b|task.{0,15}(go|belongs?)\s+to|make.{0,15}owner|should\s+be\s+(the\s+)?owner|will\s+handle\s+(this|the)|handle\s+this\s+task/i.test(q);
  const isCreateMember = /\b(create|add|make)\b.{0,25}\b(new\s+)?(team\s+)?member\b|add\s+[A-Z][a-z]+.{0,20}\bto\s+(the\s+)?team\b|add\s+(?:a\s+)?new\s+team[:\s]/i.test(q);
  const isRemoveMember = /\b(remove|delete|kick)\b.{0,20}\b(team\s+)?member\b|\b(remove|kick)\b.{0,20}\bfrom\s+(the\s+)?team\b/i.test(q);
  const isMarkDone   = /\b(mark|complete|finish|close|done)\b.{0,40}\b(done|complete[d]?|finished)\b|\btask\b.{0,20}\b(done|finished)\b/i.test(q);
  const isProgress   = /\bprogress\b|\bset\b.{0,15}\d+\s*%|\bupdate\b.{0,15}\d+\s*%/i.test(q);
  const isAddRisk    = /\badd\b.{0,15}\brisk\b|\bnew\s+risk\b/i.test(q);
  const isLeave      = /\bon\s+leave\b|\bgoing\s+on\s+leave\b|\bout\s+of\s+office\b|\bpto\b/i.test(q);
  const isStoryPts   = /\bstory\s*points?\b|\bpoints?\s*(for|to|is|are)\s*\d|\d+\s*(story\s*)?points?\b/i.test(q);
  const isNote       = /\bstakeholder\b|\bfeedback\b|\brecord\s+(a\s+)?note\b/i.test(q);
  const isEditRisk   = /\bedit\b.{0,40}\brisk\b|\bchange\b.{0,25}\brisk\b|\brename\b.{0,25}\brisk\b|remove\s+(?:the\s+)?word.{0,30}|edit\s+["'].+["']/i.test(q);
  const isQuestion   = /^(what|who|how|when|will|can|should|show|list|tell|do\s+we|are\s+we)\b/i.test(q)||/\?$/.test(q);
  const isUserStory  = /\buser\s+stor(y|ies)\b|\badd\s+stor(y|ies)\b/i.test(q);
  const isStatusCheck= /\bis\s+it\s+(complete|done|finished)\b|\bhas\s+(it|this|the\s+task)\s+been\s+(done|complete)\b/i.test(q);

  // ── 1. ADD TASK ──────────────────────────────────────────────────────
  if(isAddTask){
    const taskText=q.replace(/^.*?\b(?:add|create|new)\s+(?:a\s+)?(?:new\s+)?task[-:\s]*/i,'')
      .replace(/\b(?:due\s*(?:date\s*)?[:\-]?\s*[\d\/]+|\w+\s+\d+|capacity\s*(?:allocation\s*)?[:\-]?\s*\d+\s*h(?:ours?)?|\d+\s*h(?:ours?)?|description[:\s].+)/gi,'')
      .replace(/,\s*,/g,',').replace(/^[,\s\-]+|[,\s\-]+$/g,'').split(',')[0].trim();
    const due=(q.match(/due\s*(?:date\s*)?[:\-]?\s*([\d\/]+)/i)||[])[1]||'';
    const hrs=parseInt((q.match(/(?:capacity\s*(?:allocation\s*)?[:\-]?\s*)?(\d+)\s*h(?:ours?)?/i)||[])[1])||null;
    const desc=(q.match(/description[:\s]+(.+?)(?:$|,\s*(?:due|capacity|owner|story))/is)||[])[1]||'';
    const storyInTask=(q.match(/user\s+stor(?:y|ies)\s*(?:detail)?[:\s]+(.+?)(?:user\s+stor(?:y|ies)\s+point|capacity|due|description|$)/is)||[])[1]||'';
    const ownerRaw=(q.match(/\bowner[:\s]+([A-Za-z]+(?:\s+[A-Za-z.]+)?)/i)||[])[1]||'';
    const sp=parseInt((q.match(/(\d+)\s*(?:story\s*)?(?:points?|sp)\b/i)||[])[1])||null;
    const ownerInitials=ownerRaw?makeInitials(ownerRaw):'TL';
    if(ownerRaw){const r=resolveOrCreateMember(p,ownerRaw,projId);if(r.created)replies.push(ownerRaw+' added to team.');}
    const newId=uid();
    p.tasks.push({id:newId,text:taskText||q.slice(0,50),done:false,owner:ownerInitials,
      due_date:due,hours:hrs,storyPoints:sp,story:storyInTask.trim(),description:desc.trim()});
    setCtx(projId,{lastTaskId:newId,lastAction:'add_task'});
    const det=[due?'due '+due:'',hrs?hrs+'h':'',sp?sp+' pts':''].filter(Boolean);
    replies.push('Task "'+( taskText||q.slice(0,40))+'" added'+(det.length?' ('+det.join(', ')+')':'')+'.');
    actions++;
    // If message ALSO assigns, handle below
    if(!isAssign&&!isCreateMember) return {reply:replies.join(' '),actions};
  }

  // ── 2. ASSIGN / OWNER UPDATE (handles many natural phrasings) ────────
  if(isAssign||isCreateMember){
    const name=extractName(q);
    if(name){
      const r=resolveOrCreateMember(p,name,projId);
      if(r.created) replies.push(name+' ('+r.member.initials+') added as new team member.');
      // Find the target task
      const taskHint=q.replace(new RegExp(name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),'')
                      .replace(/assign|create|add|new|member|owner|task|him|her|this|that|give|handle|should|make|team|the|to|and|a/gi,'').trim();
      const t=bestTask(taskHint.length>4?taskHint:null);
      if(t){
        t.owner=r.member.initials;
        setCtx(projId,{lastTaskId:t.id,lastMemberId:r.member.id,lastAction:'assign'});
        replies.push('Task "'+t.text+'" assigned to '+name+' ('+r.member.initials+').');
        actions++;
      } else if(!isAddTask){
        setCtx(projId,{pendingAction:'clarify_task',pendingData:{op:'assign',name}});
        replies.push('Got it — '+name+' '+(r.created?'added to team. ':'')+'Which task should I assign to them? '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,35)+'"').join(', '));
        actions+=r.created?1:0;
      }
    } else if(!isAddTask&&!isCreateMember){
      replies.push(p.tasks.length?'Who should I assign this to? Give me a name.':'Add a task first, then tell me who should own it.');
    } else if(isCreateMember&&!name){
      setCtx(projId,{pendingAction:'clarify_member',pendingData:{op:'add_member'}});
      replies.push('What\'s the new member\'s name?');
    }
    if(!isMarkDone&&!isProgress&&!isAddRisk&&!isLeave&&!isStoryPts&&!isNote&&!isRemoveMember){
      return {reply:replies.filter(Boolean).join(' '),actions};
    }
  }

  // ── 3. REMOVE TEAM MEMBER ────────────────────────────────────────────
  if(isRemoveMember){
    const nm=q.match(/(?:remove|delete|kick)\s+(?:team\s+)?member[:\s]+([A-Za-z]+(?:\s+[A-Za-z.]+)?)/i)||
             q.match(/(?:remove|delete|kick)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)\s+(?:from|off)/i)||
             q.match(/(?:remove|delete)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)\s+from\s+(?:the\s+)?team/i)||
             q.match(/["']([A-Za-z]+(?:\s+[A-Za-z.]+)*)["']/);
    const SKIP=/^(the|a|team|member|new|project)$/i;
    const name=nm&&!SKIP.test(nm[1].trim())?nm[1].trim():'';
    if(name){
      const idx=p.team.findIndex(m=>m.name.toLowerCase().startsWith(name.toLowerCase().split(' ')[0]));
      if(idx>=0){const removed=p.team.splice(idx,1)[0];replies.push(removed.name+' removed from team.');actions++;}
      else replies.push('"'+name+'" not found. Team: '+p.team.map(m=>m.name).join(', '));
    } else replies.push('Who should I remove? E.g. "Remove Josh S from team"');
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 4. MARK TASK DONE ────────────────────────────────────────────────
  if(isMarkDone){
    const hint=q.replace(/mark|done|complete|finish|task|the|as|it/gi,'').trim();
    const t=bestTask(hint.length>3?hint:null);
    if(t){t.done=true;setCtx(projId,{lastTaskId:t.id,lastAction:'done'});replies.push('Task "'+t.text+'" marked as done.');actions++;}
    else {
      const pending=p.tasks.filter(t=>!t.done);
      if(pending.length===0){replies.push('All tasks are already done!');}
      else{
        setCtx(projId,{pendingAction:'clarify_task',pendingData:{op:'mark_done'}});
        replies.push('Which task is done? '+pending.map((t,i)=>(i+1)+'. "'+t.text.slice(0,35)+'"').join(', '));
      }
    }
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 5. STORY POINTS ──────────────────────────────────────────────────
  if(isStoryPts){
    // Extract number: "Story Points: 3", "is 3", "= 5", "3 points", "story point 2"
    const _a=q.match(/(?:story\s*points?\s*(?:is|are|:|=|to)\s*)(\d+)/i)||
              q.match(/(?:points?\s*(?:is|are|:|=|to)\s*)(\d+)/i)||
              q.match(/(?:set|update)\s+(?:story\s*)?points?\s+(?:to\s+)?(\d+)/i)||
              q.match(/^(\d+)\s+(?:story\s*)?points?/i)||
              q.match(/(\d+)\s*(?:story\s*)?points?\b/i)||
              q.match(/(?:story\s*points?)\s+(\d+)/i);
    const pts=_a?parseInt(_a[1]):0;
    if(pts){
      const hint=q.replace(/story\s*points?.*|\d+\s*points?.*/i,'').replace(/update|task|for|the|to|is|set/gi,'').trim();
      const t=bestTask(hint.length>3?hint:null);
      if(t){t.storyPoints=pts;setCtx(projId,{lastTaskId:t.id,lastAction:'story_points'});replies.push('Story points for "'+t.text+'" set to '+pts+'.');actions++;}
      else if(p.tasks.length>1){
        setCtx(projId,{pendingAction:'clarify_task',pendingData:{op:'story_points',sp:pts}});
        replies.push('Which task should I update? '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,35)+'"').join(', '));
      } else replies.push('No tasks found.');
    }
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 6. UPDATE PROGRESS ───────────────────────────────────────────────
  if(isProgress&&!isAddTask){
    const pct=parseInt((q.match(/(\d+)\s*%/)||[])[1]);
    if(pct){p.progress=Math.min(100,Math.max(0,pct));replies.push('Progress updated to '+p.progress+'%.');actions++;}
    else replies.push('What percentage? E.g. "Set progress to 60%"');
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 7. ADD RISK ───────────────────────────────────────────────────────
  if(isAddRisk&&!isEditRisk){
    const lvl=/\bhigh\b/i.test(q)?'High':/\blow\b/i.test(q)?'Low':'Med';
    let txt=q
      .replace(/^add\s+(?:a\s+)?(?:high|medium|med|low)?\s*risk\s*/i,'')  // strip leading "Add a High risk"
      .replace(/\bRisk\s+Radar\b/gi,'')    // strip "Risk Radar" UI label
      .replace(/\bRisk\s+Radar:\s*/gi,'')   // strip "Risk Radar:"
      .replace(/^\s*Radar\s+/i,'')           // strip orphaned leading "Radar" word
      .replace(/\bas\s+(?:high|medium|med|low)\s+risk\s*$/i,'')  // strip trailing "as High risk"
      .replace(/,?\s*(?:high|medium|med|low)\s+risk\s*$/i,'')     // strip trailing "High risk"
      .replace(/^[,\s:\-]+|[,\s:\-]+$/g,'')
      .trim();
    if(!txt) txt='Unspecified risk';
    p.risks.push({id:uid(),level:lvl,text:txt});
    replies.push('Risk added ['+lvl+']: "'+txt+'".');
    actions++;
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 7b. EDIT / UPDATE RISK ───────────────────────────────────────────
  if(isEditRisk){
    // Find which risk to edit — by quoted text or keyword match
    const quotedMatch=q.match(/["']([^"']{5,})["']/g);
    const riskHint=quotedMatch?quotedMatch[0].replace(/["']/g,'').trim():'';
    const r=riskHint?p.risks.find(r=>r.text.toLowerCase().includes(riskHint.toLowerCase().slice(0,20))):
                     p.risks[p.risks.length-1];
    if(r){
      // What to change?
      const removeWord=q.match(/remove\s+(?:the\s+)?word\s+["']?([A-Za-z]+)["']?/i);
      const changeTo=q.match(/(?:change\s+(?:it\s+)?to|rename\s+(?:to\s+)?|set\s+(?:it\s+)?to)\s*["']?([^"']+)["']?\s*$/i);
      const newText=q.match(/(?:new\s+(?:text|name)\s*[:\-]?\s*|to\s*["'])([^"']+)["']?\s*$/i);
      if(removeWord){
        const word=removeWord[1];
        r.text=r.text.replace(new RegExp('\\b'+word+'\\b\\s*','gi'),'').replace(/^[,\s:\-]+|[,\s:\-]+$/g,'').trim();
        replies.push('Risk updated: "'+r.text+'".');
        actions++;
      } else if(changeTo){
        r.text=changeTo[1].trim();
        replies.push('Risk renamed to: "'+r.text+'".');
        actions++;
      } else if(newText){
        r.text=newText[1].trim();
        replies.push('Risk updated to: "'+r.text+'".');
        actions++;
      } else {
        replies.push('What should I change the risk to? E.g. "Rename risk to: Unavailability of Stakeholder"');
      }
    } else if(p.risks.length===0){
      replies.push('No risks recorded yet.');
    } else {
      replies.push('Which risk? Risks: '+p.risks.map((r,i)=>(i+1)+'. "'+r.text.slice(0,40)+'"').join(', '));
    }
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 8. ADD TEAM MEMBER (explicit, no assign) ─────────────────────────
  if(isCreateMember&&!isAssign&&replies.length===0){
    // Extract name: "Add team member: Karl G", "Add new team: Karl G", "Add Karl G to team"
    const nmMatch=
      q.match(/(?:add|new)\s+team\s*[:\-]\s*([A-Za-z]+(?:\s+[A-Za-z.]+)?)/i)||
      q.match(/(?:add\s+(?:a\s+)?(?:new\s+)?(?:team\s+)?member[:\s]+)([A-Za-z]+(?:\s+[A-Za-z.]+)?)/i)||
      q.match(/member[:\s]+([A-Za-z]+(?:\s+[A-Za-z.]+)?)/i)||
      q.match(/(?:add|bring|include)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s+to\s+(?:the\s+)?team/i)||
      q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s+as\s+(?:new\s+)?(?:team\s+)?member/i);
    const SKIP=/^(the|a|an|new|team|member|project|this|that)$/i;
    const memberName=nmMatch&&nmMatch[1]&&!SKIP.test(nmMatch[1].trim())?nmMatch[1].trim():'';
    if(memberName){
      const r=resolveOrCreateMember(p,memberName,projId);
      const roleM=(q.match(/(?:as|role[:\s]+)\s*([A-Za-z][A-Za-z ]+?)(?:,|\.|$|\d)/i)||[])[1];
      if(roleM) r.member.role=roleM.trim();
      replies.push(memberName+' ('+r.member.initials+') '+(r.created?'added to team':'already on team — updated')+'.');
      actions++;
    } else {
      // No name found — set pending so next reply adds them
      setCtx(projId,{pendingAction:'clarify_member',pendingData:{op:'add_member'}});
      replies.push("What's their name? Just type it.");
    }
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 9. LEAVE ────────────────────────────────────────────────────────
  if(isLeave){
    const nm=q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s+(?:is\s+)?(?:on\s+leave|going\s+on\s+leave|out\s+of\s+office)/i)||
             q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s+(?:will\s+be\s+)?on\s+leave/i);
    const dm=(q.match(/(\w+\s*\d+\s*[-to]+\s*\w*\s*\d*)/i)||[])[1];
    const name=nm?nm[1].trim():'';
    if(name){const r=resolveOrCreateMember(p,name,projId);r.member.onLeave=true;if(dm)r.member.leaveDates=dm;replies.push(name+' marked on leave'+(dm?' ('+dm+')'||'':'')+'.') ;actions++;}
    else replies.push('Who is going on leave? E.g. "Josh S is on leave May 10-20"');
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 10. STAKEHOLDER NOTE ────────────────────────────────────────────
  if(isNote&&!isEditRisk&&!isAddRisk){
    if(!p.notes)p.notes=[];
    const title=q.replace(/^(submit|add|record)\s+(a\s+)?/i,'').split(/[.,]/)[0].slice(0,60);
    p.notes.push({title,content:q,category:'stakeholder',date:new Date().toLocaleDateString()});
    replies.push('Stakeholder note recorded.');actions++;
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 11. USER STORY ──────────────────────────────────────────────────
  if(isUserStory&&!isAddTask){
    // Extract story text — everything after "user story:" or "story details:"
    const storyText=(
      q.match(/user\s+stor(?:y|ies)\s*(?:details?\s*)?[:\-]\s*(.+)/is)||
      q.match(/add\s+stor(?:y|ies)\s*[:\-]\s*(.+)/is)||
      q.match(/stor(?:y|ies)\s+(?:for\s+\S+\s*[:\-]\s*)(.+)/is)||
      q.match(/details?\s*[:\-]\s*(?!user\s+story\s+point)(.{10,})/is)
    );
    const storyContent=storyText?storyText[1].trim():'';
    // Extract story points if mentioned
    const spMatch=q.match(/(?:user\s+)?story\s+points?\s*[:\-]?\s*(\d+)/i)||q.match(/(\d+)\s+(?:user\s+)?story\s+points?/i);
    const sp=spMatch?parseInt(spMatch[1]):null;
    // Find the task
    const taskHint=q.replace(/user\s+stor(y|ies)|story\s+points?|add|update|details?|point\s*\d*/gi,'').replace(/\d+/g,'').trim();
    const t=bestTask(taskHint.length>4?taskHint:null);
    if(t){
      if(storyContent){t.story=storyContent;replies.push('User story saved for "'+t.text+'".');}
      if(sp){t.storyPoints=sp;replies.push('Story points set to '+sp+'.');}
      if(!storyContent&&!sp) replies.push('What is the user story text? E.g. "Add user story: As a user I want to..."');
      setCtx(projId,{lastTaskId:t.id,lastAction:'user_story'});
      actions++;
    } else if(p.tasks.length===0){
      replies.push('No tasks found yet. Add a task first.');
    } else {
      // Store pending action so next reply picks the right task
      setCtx(projId,{pendingAction:'clarify_task',pendingData:{op:'user_story',storyContent,sp}});
      replies.push('Which task should I add this to? '+(p.tasks.length<=5?'Tasks: '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,35)+'"').join(', '):'Reply with the task number or name.'));
    }
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 12. STATUS CHECK ─────────────────────────────────────────────────
  if(isStatusCheck){
    const t=bestTask(null);
    if(t){
      replies.push('"'+t.text+'" is '+(t.done?'complete ✓':'still pending')+
        (t.due_date?' (due '+t.due_date+')':'')+
        (t.storyPoints?' · '+t.storyPoints+' story pts':'')+
        (t.hours?' · '+t.hours+'h allocated':'')+'.');
    } else if(p.tasks.length>1){
      setCtx(projId,{pendingAction:'clarify_task',pendingData:{op:'status_check'}});
      replies.push('Which task are you asking about? '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,35)+'"').join(', '));
    } else replies.push('No tasks found yet.');
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── 13. QUESTION / ANALYSIS ──────────────────────────────────────────
  if(isQuestion||replies.length===0){
    replies.push(answerQuestion(p,q,projId));
  }

  return {reply:replies.filter(Boolean).join(' '),actions};
}


// ── PENDING ACTION RESOLVER ───────────────────────────────────────────
// Called when the assistant previously asked a clarifying question.
// q is the user's reply. Returns a result object or null if can't resolve.
function resolvePending(p, q, projId, ctx){
  const pa=ctx.pendingAction;
  const pd=ctx.pendingData||{};
  const ql=q.toLowerCase().trim();

  // Helper: pick a task by number "1", "2", "task 2", or by name fragment
  function pickTask(q){
    const numMatch=q.match(/^(\d+)\.?\s*/)||q.match(/\btask\s*(\d+)\b/i)||q.match(/^#(\d+)/);
    if(numMatch){
      const idx=parseInt(numMatch[1])-1;
      if(idx>=0&&idx<p.tasks.length) return p.tasks[idx];
    }
    // Name fragment match
    const ql=q.toLowerCase().replace(/^[\d.\s]+/,'').trim();
    if(ql.length>2){
      const direct=p.tasks.find(t=>t.text.toLowerCase().includes(ql));
      if(direct) return direct;
      const words=ql.split(/\s+/).filter(w=>w.length>3);
      for(const w of words){
        const f=p.tasks.find(t=>t.text.toLowerCase().includes(w));
        if(f) return f;
      }
    }
    return null;
  }

  // Helper: pick a member by number or name
  function pickMember(q){
    const numMatch=q.match(/^(\d+)\.?\s*/);
    if(numMatch){const idx=parseInt(numMatch[1])-1;if(idx>=0&&idx<p.team.length)return p.team[idx];}
    const ql=q.toLowerCase().replace(/^[\d.\s]+/,'').trim();
    return p.team.find(m=>m.name.toLowerCase().includes(ql))||null;
  }

  // ── Resolve WHICH TASK (user_story, story_points, assign, mark_done, update) ──
  // Resolve: user replied with just a name after "What's the new member's name?"
  if(pa==='clarify_member'){
    const name=q.trim();
    if(name.length>1&&name.length<40){
      const r=resolveOrCreateMember(p,name,projId);
      const roleM=(pd.role||'');
      if(roleM) r.member.role=roleM;
      return {reply:name+' ('+r.member.initials+') '+(r.created?'added to team':'already on team')+'.',actions:1};
    }
    return null;
  }

  if(pa==='clarify_task'){
    const t=pickTask(q);
    if(!t) return null; // can't resolve, fall through to normal parsing
    setCtx(projId,{lastTaskId:t.id});
    const replies=[];
    let actions=0;
    // Apply the stored pending operation to the found task
    if(pd.op==='user_story'){
      if(pd.storyContent){t.story=pd.storyContent;replies.push('User story saved for "'+t.text+'".');}
      if(pd.sp){t.storyPoints=pd.sp;replies.push('Story points set to '+pd.sp+'.');}
      actions++;
    } else if(pd.op==='story_points'){
      t.storyPoints=pd.sp;replies.push('Story points for "'+t.text+'" set to '+pd.sp+'.');actions++;
    } else if(pd.op==='assign'){
      const r=resolveOrCreateMember(p,pd.name,projId);
      if(r.created)replies.push(pd.name+' added to team.');
      t.owner=r.member.initials;
      replies.push('Task "'+t.text+'" assigned to '+pd.name+' ('+r.member.initials+').');
      actions++;
    } else if(pd.op==='mark_done'){
      t.done=true;replies.push('Task "'+t.text+'" marked as done.');actions++;
    } else if(pd.op==='status_check'){
      replies.push('"'+t.text+'" is '+(t.done?'complete ✓':'still pending')+
        (t.due_date?' (due '+t.due_date+')':'')+
        (t.storyPoints?' · '+t.storyPoints+' pts':'')+
        (t.hours?' · '+t.hours+'h':'')+'.');
    } else {
      replies.push('Got it — working on "'+t.text+'".');
    }
    return {reply:replies.filter(Boolean).join(' '),actions};
  }

  // ── Resolve ADD MEMBER — user just types the name ──────────────────
  if(pa==='clarify_member'){
    // User replied with just a name like "Karl G"
    const trimmed=q.trim();
    // Accept if it looks like a name (1-3 words, starts with capital) or any non-empty reply
    const nameGuess=trimmed.match(/^([A-Za-z]+(?:\s+[A-Za-z.]+){0,2})$/)?trimmed:
                    trimmed.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)/)?trimmed.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)/)[1]:
                    trimmed.length>1?trimmed:null;
    if(nameGuess){
      const r=resolveOrCreateMember(p,nameGuess,projId);
      setCtx(projId,{lastMemberId:r.member.id});
      return {reply:nameGuess+' ('+r.member.initials+') '+(r.created?'added to team.':'already on team.'),actions:1};
    }
    return null;
  }

  // ── Resolve YES/NO confirmations ──────────────────────────────────────
  if(pa==='confirm'){
    const yes=/^(yes|yeah|yep|sure|ok|okay|do it|go ahead|correct|right|that one|confirm)/i.test(ql);
    const no=/^(no|nope|cancel|never mind|stop|don't|dont)/i.test(ql);
    if(yes&&pd.op==='delete_task'&&pd.taskId){
      p.tasks=p.tasks.filter(t=>t.id!==pd.taskId);
      return {reply:'Task deleted.',actions:1};
    }
    if(no) return {reply:'Okay, no changes made.',actions:0};
    return null;
  }

  // ── Resolve plain name reply (after "What's their name?") ───────────
  if(pa==='clarify_member'){
    const SKIP=/^(the|a|an|yes|no|ok|done|that|this|it|them|him|her)$/i;
    const nameOnly=q.trim().match(/^([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s*$/)&&!SKIP.test(q.trim());
    if(nameOnly){
      const r=resolveOrCreateMember(p,q.trim(),projId);
      return {reply:q.trim()+' ('+r.member.initials+') '+(r.created?'added to team.':'already on team.'),actions:1};
    }
    return null;
  }

  return null; // couldn't resolve
}


function answerQuestion(p,q,projId){
  const ql=q.toLowerCase();
  const done=p.tasks.filter(t=>t.done),pending=p.tasks.filter(t=>!t.done);
  const highRisks=p.risks.filter(r=>r.level==='High');
  const overloaded=p.team.filter(m=>!m.onLeave&&m.load>85);
  const onLeave=p.team.filter(m=>m.onLeave);
  const totalHrs=p.tasks.reduce((s,t)=>s+(t.hours||0),0);
  const totalPts=p.tasks.reduce((s,t)=>s+(t.storyPoints||0),0);

  if(/risk/i.test(ql)){
    if(!p.risks.length) return 'No risks recorded yet. Say "add risk: [description]" to add one.';
    return 'Risks for '+p.name+': '+p.risks.map(r=>'['+r.level+'] '+r.text).join(' | ')+(highRisks.length?' — '+highRisks.length+' high priority!':'');
  }
  if(/overload|capacity|who.*busy|team.*load/i.test(ql)){
    if(!p.team.length) return 'No team members yet.';
    const lines=p.team.map(m=>m.name+(m.onLeave?' (on leave)':' at '+m.load+'%'));
    return 'Team: '+lines.join(', ')+(overloaded.length?' — '+overloaded.map(m=>m.name).join(', ')+' overloaded!':'');
  }
  if(/finish.*time|deadline|on\s+time|deliver/i.test(ql)){
    const activeHrs=p.team.filter(m=>!m.onLeave).reduce((s,m)=>s+(m.hours||0),0);
    const pendingHrs=pending.reduce((s,t)=>s+(t.hours||0),0);
    const weeks=activeHrs>0?Math.ceil(pendingHrs/activeHrs):null;
    return (p.progress>=75?'On track':'At risk')+' — '+p.progress+'% done, '+done.length+'/'+p.tasks.length+' tasks complete'+(weeks?' (~'+weeks+'wk remaining)':'')+(highRisks.length?', '+highRisks.length+' high risk(s) need attention':'');
  }
  if(/prioriti|this\s+week|focus/i.test(ql)){
    const upcoming=pending.filter(t=>t.due_date).slice(0,3);
    const parts=[];
    if(highRisks.length) parts.push('Address '+highRisks.length+' high risk(s)');
    if(upcoming.length) parts.push('Upcoming: '+upcoming.map(t=>t.text.slice(0,25)+' (due '+t.due_date+')').join(', '));
    if(overloaded.length) parts.push('Rebalance: '+overloaded.map(m=>m.name).join(', ')+' overloaded');
    return parts.length?parts.join(' | '):'Looking good! '+pending.length+' task(s) remaining.';
  }
  if(/task|backlog|todo/i.test(ql)){
    if(!p.tasks.length) return 'No tasks yet. Say "add task: [name], due 5/15, 10 hours" to add one.';
    return p.tasks.map(t=>(t.done?'[done]':'[todo]')+' '+t.text+(t.owner?' ['+t.owner+']':'')+(t.due_date?' due:'+t.due_date:'')+(t.storyPoints?' '+t.storyPoints+'pts':'')).join(' | ');
  }
  if(/team|member|who.*team/i.test(ql)){
    if(!p.team.length) return 'No team members yet.';
    return 'Team: '+p.team.map(m=>m.name+' ('+m.initials+')'+(m.onLeave?' on leave':' '+m.load+'%')).join(', ');
  }
  if(/progress|status|how.*going|summary/i.test(ql)){
    return p.name+': '+p.progress+'% complete, '+done.length+'/'+p.tasks.length+' tasks done, '+totalHrs+'h total'+(totalPts?' '+totalPts+' story pts':'')+', '+p.team.length+' team members'+(onLeave.length?' ('+onLeave.length+' on leave)':'')+(highRisks.length?', '+highRisks.length+' high risk(s)':'')+'.';
  }
  return 'I can help you manage "'+p.name+'". Try: "What are my risks?", "Who is overloaded?", "Will we finish on time?", or ask me to add a task, assign work, or update the team.';
}

function buildSnapshot(p){
  const lines=['Project: '+p.name+' | '+statusLabel(p.status)+' | '+p.progress+'%'];
  if(p.tasks.length) lines.push('Tasks: '+p.tasks.map((t,i)=>(i+1)+'. ['+(t.done?'done':'todo')+'] "'+t.text+'" owner:'+t.owner+(t.due_date?' due:'+t.due_date:'')+(t.hours?' '+t.hours+'h':'')+(t.storyPoints?' '+t.storyPoints+'pts':'')).join(' | '));
  if(p.team.length) lines.push('Team: '+p.team.map(m=>m.initials+':'+m.name+(m.role?' ('+m.role+')':'')+(m.onLeave?' ON LEAVE':' '+m.load+'%')).join(', '));
  if(p.risks.length) lines.push('Risks: '+p.risks.map(r=>'['+r.level+'] '+r.text).join(' | '));
  return lines.join('\n');
}

function makeInitials(name){
  return name.trim().split(/\s+/).filter(w=>w).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
}

function resolveOrCreateMember(p,name,projId){
  if(!name) return null;
  const nl=name.toLowerCase().trim();
  let m=p.team.find(m=>m.name.toLowerCase()===nl||m.name.toLowerCase().startsWith(nl.split(' ')[0]));
  if(m) return {member:m,created:false};
  const newM={id:uid(),name:name.trim(),initials:makeInitials(name),role:'',load:70,hours:40,onLeave:false,leaveDates:'',notes:'',color:'#ede9fe'};
  p.team.push(newM);
  if(projId) setCtx(projId,{lastMemberId:newM.id});
  return {member:newM,created:true};
}

function findTask(p,match){
  if(!match) return null;
  const ml=match.toLowerCase().trim();
  let t=p.tasks.find(t=>t.text.toLowerCase().includes(ml));
  if(t) return t;
  const words=ml.split(/\s+/).filter(w=>w.length>3);
  for(const w of words){t=p.tasks.find(t=>t.text.toLowerCase().includes(w));if(t)return t;}
  return null;
}

function executeActions(p,actions,projId){
  const results=[];
  for(const a of actions){
    try{
      if(a.type==='add_task'){
        const r=a.owner_name?resolveOrCreateMember(p,a.owner_name,projId):null;
        const newId=uid();
        p.tasks.push({id:newId,text:a.text,done:false,owner:r?r.member.initials:'TL',due_date:a.due_date||'',hours:a.hours||null,storyPoints:a.storyPoints||null,story:a.story||'',description:a.description||''});
        setCtx(projId,{lastTaskId:newId,lastAction:'add_task'});
        results.push('task_added');
      } else if(a.type==='update_owner'||a.type==='assign_task'){
        const t=findTask(p,a.task_match)||(getCtx(projId).lastTaskId?p.tasks.find(t=>t.id===getCtx(projId).lastTaskId):null)||p.tasks[p.tasks.length-1];
        if(t&&a.owner_name){const r=resolveOrCreateMember(p,a.owner_name,projId);t.owner=r.member.initials;setCtx(projId,{lastTaskId:t.id});results.push('assigned');}
      } else if(a.type==='add_member'){
        const r=resolveOrCreateMember(p,a.name,projId);
        if(a.role) r.member.role=a.role;if(a.hours) r.member.hours=a.hours;if(a.load) r.member.load=a.load;
        results.push('member_added');
      } else if(a.type==='mark_done'){
        const t=findTask(p,a.task_match)||(getCtx(projId).lastTaskId?p.tasks.find(t=>t.id===getCtx(projId).lastTaskId):null);
        if(t){t.done=true;setCtx(projId,{lastTaskId:t.id});results.push('done');}
      } else if(a.type==='update_story_points'){
        const t=findTask(p,a.task_match)||(getCtx(projId).lastTaskId?p.tasks.find(t=>t.id===getCtx(projId).lastTaskId):null)||p.tasks[p.tasks.length-1];
        if(t){t.storyPoints=parseInt(a.points);setCtx(projId,{lastTaskId:t.id});results.push('story_pts');}
      } else if(a.type==='add_risk'){
        p.risks.push({id:uid(),level:a.level||'Med',text:a.text});results.push('risk_added');
      } else if(a.type==='update_progress'){
        p.progress=Math.min(100,Math.max(0,parseInt(a.value)));results.push('progress');
      } else if(a.type==='add_note'){
        if(!p.notes)p.notes=[];p.notes.push({title:a.title,content:a.content,category:a.category||'update',date:new Date().toLocaleDateString()});results.push('note');
      } else if(a.type==='member_leave'){
        const r=resolveOrCreateMember(p,a.name,projId);r.member.onLeave=!!a.onLeave;if(a.leaveDates)r.member.leaveDates=a.leaveDates;results.push('leave');
      } else if(a.type==='delete_task'){
        const t=findTask(p,a.task_match);if(t){p.tasks=p.tasks.filter(tt=>tt.id!==t.id);results.push('deleted');}
      } else if(a.type==='update_task_detail'){
        const t=findTask(p,a.task_match)||(getCtx(projId).lastTaskId?p.tasks.find(t=>t.id===getCtx(projId).lastTaskId):null);
        if(t&&a.field){t[a.field]=a.value;setCtx(projId,{lastTaskId:t.id});results.push('updated');}
      }
    }catch(e){console.warn('action error:',a,e);}
  }
  return results;
}

  const newId=Math.max(...projects.map(p=>p.id),0)+1;
  const lead=document.getElementById('npLead').value.trim()||'Unassigned';
  projects.push({id:newId,name,desc:document.getElementById('npDesc').value||'No description',status:document.getElementById('npStatus').value,progress:parseInt(document.getElementById('npProgress').value)||0,lead,color:COLORS[newId%COLORS.length],notes:[],
    tasks:[{id:uid(),text:'Set up project structure',done:false,owner:lead.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'TL',due_date:'',hours:4,story:'',description:''}],
    risks:[{id:uid(),level:'Low',text:'Initial setup complexity'}],
    team:[{id:uid(),initials:lead.trim().split(/\s+/).filter(w=>w).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'TL',name:lead,role:'Project Lead',load:70,hours:40,onLeave:false,leaveDates:'',notes:'',color:'#ede9fe'}]
  });
  closeModal('addProjModal');['npName','npDesc','npLead'].forEach(id=>document.getElementById(id).value='');document.getElementById('npProgress').value='0';
  renderSidebar();renderOverview();openProject(newId);
}
function copyText(outId,btnId,label){navigator.clipboard.writeText(document.getElementById(outId).textContent);const b=document.getElementById(btnId);b.textContent='Copied!';setTimeout(()=>b.textContent=label,2000);}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));

renderSidebar();renderOverview();
</script>
