<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProjectAI v4 — AI Project Management</title>
<meta property="og:title" content="ProjectAI — AI-Powered Project Management"/>
<meta property="og:description" content="Manage projects, tasks, risks and generate AI status reports. Built with Claude AI."/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,.08);--border-md:rgba(0,0,0,.13);--text:#1a1917;--text2:#6b6960;--text3:#9b9a94;--accent:#5b4fcf;--accent-light:#eeecfc;--accent-mid:#a09be0;--radius:10px;--radius-lg:14px;--radius-xl:18px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--sidebar-w:260px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;flex-shrink:0}
.sidebar-header{padding:18px 18px 12px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:3px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-size:15px;font-weight:500;letter-spacing:-.3px}
.logo-tag{font-size:11px;color:var(--text3);font-family:var(--mono)}
.sidebar-section{padding:12px 12px 5px;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.proj-list{flex:1;overflow-y:auto;padding:0 8px}
.proj-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;margin-bottom:2px;transition:all .15s;border:1px solid transparent}
.proj-item:hover{background:var(--surface2)}
.proj-item.active{background:var(--accent-light);border-color:rgba(91,79,207,.15)}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-item-name{flex:1;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-item.active .proj-item-name{color:var(--accent);font-weight:500}
.proj-badge{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--surface2);color:var(--text3)}
.proj-item.active .proj-badge{background:rgba(91,79,207,.12);color:var(--accent)}
.add-proj-btn{margin:8px;padding:9px 14px;border-radius:var(--radius);border:1.5px dashed var(--border-md);background:transparent;color:var(--text2);font-size:12.5px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;width:calc(100% - 16px)}
.add-proj-btn:hover{background:var(--surface2);border-color:var(--accent-mid);color:var(--accent)}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border)}
.overview-btn{width:100%;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border-md);background:transparent;color:var(--text2);font-size:12.5px;font-family:var(--font);cursor:pointer;text-align:left;transition:all .15s}
.overview-btn:hover,.overview-btn.active{background:var(--accent-light);color:var(--accent);border-color:rgba(91,79,207,.2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.main-title{font-size:16px;font-weight:500;letter-spacing:-.2px}
.main-sub{font-size:12px;color:var(--text3);margin-top:1px}
.header-tabs{display:flex;gap:3px;background:var(--surface2);padding:3px;border-radius:var(--radius);flex-wrap:wrap}
.htab{font-size:12px;padding:5px 12px;border-radius:7px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.htab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.main-body{flex:1;overflow-y:auto;padding:20px 24px}
/* CAPACITY BAR */
.capacity-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.cap-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.cap-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;min-width:120px}
.cap-fill{height:100%;border-radius:4px;transition:width .5s ease}
.cap-stat{font-size:13px;font-weight:500;white-space:nowrap}
.cap-members{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
.cap-member{display:flex;align-items:center;gap:5px}
.cap-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500}
/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl);padding:24px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:500;margin-bottom:14px}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:10px}
.modal input,.modal textarea,.modal select{width:100%;padding:8px 11px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:13px;background:var(--surface2);color:var(--text);outline:none}
.modal textarea{min-height:70px;resize:vertical;line-height:1.5}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border-md);background:transparent;color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer}
.btn-primary{padding:8px 18px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500}
.btn-danger{padding:8px 14px;border-radius:var(--radius);border:none;background:#fee2e2;color:#991b1b;font-family:var(--font);font-size:13px;cursor:pointer}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.card-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.ellipsis-btn{width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:16px;line-height:1;transition:all .15s;position:relative}
.ellipsis-btn:hover{background:var(--surface2);color:var(--text)}
.dropdown{display:none;position:absolute;right:0;top:100%;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;min-width:160px;overflow:hidden}
.dropdown.open{display:block}
.dd-item{padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background .1s;white-space:nowrap}
.dd-item:hover{background:var(--surface2)}
.dd-item.danger{color:#dc2626}
/* TASKS */
.task-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-radius:6px;margin:0 -6px;padding-left:6px;padding-right:6px}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--surface2)}
.tchk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border-md);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.tchk.done{background:var(--accent);border-color:var(--accent)}
.task-main{flex:1;min-width:0}
.task-name-text{font-size:12.5px;font-weight:500;margin-bottom:2px}
.task-name-text.done{text-decoration:line-through;color:var(--text3)}
.task-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.chip-sm{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500}
.task-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500;flex-shrink:0}
/* RISK ROWS */
.risk-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.risk-row:last-child{border-bottom:none}
.rpill{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;white-space:nowrap}
/* TEAM ROWS */
.team-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.team-row:last-child{border-bottom:none}
.team-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0}
.wbar{flex:1;height:5px;border-radius:3px;background:var(--surface2)}
.wfill{height:100%;border-radius:3px;transition:width .4s}
.on-leave{font-size:10px;padding:1px 6px;border-radius:4px;background:#fef9c3;color:#92400e;font-weight:500}
/* INSIGHTS */
.insight-item{display:flex;gap:8px;align-items:flex-start;padding:8px;border-radius:var(--radius);margin-bottom:6px}
.insight-item:last-child{margin-bottom:0}
.ii-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ii-text{font-size:12.5px;line-height:1.4}
.ii-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ins-w{background:#fff7ed}.ins-w .ii-icon{background:#fed7aa;color:#92400e}
.ins-g{background:#f0fdf4}.ins-g .ii-icon{background:#bbf7d0;color:#166534}
.ins-b{background:#eff6ff}.ins-b .ii-icon{background:#bfdbfe;color:#1e40af}
/* CHAT */
.chat-messages{display:flex;flex-direction:column;gap:10px;min-height:180px;margin-bottom:12px}
.cmsg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.5}
.cmsg-user{align-self:flex-end;background:var(--accent);color:white;border-radius:12px 12px 3px 12px}
.cmsg-ai{align-self:flex-start;background:var(--surface2);color:var(--text);border-radius:12px 12px 12px 3px}
.cmsg-ai.thinking{color:var(--text3);font-style:italic}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1;padding:9px 13px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:13px;background:var(--surface2);color:var(--text);outline:none}
.chat-input-row input:focus{border-color:var(--accent)}
.send-btn,.gen-btn{padding:9px 16px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500}
.send-btn:disabled,.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.quick-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:11.5px;padding:5px 11px;border:1px solid var(--border-md);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent-mid);color:var(--accent)}
/* GRID */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric-card{background:var(--surface2);border-radius:var(--radius);padding:12px 14px}
.mc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mc-val{font-size:20px;font-weight:500}
.mc-sub{font-size:11px;margin-top:2px;color:var(--text3)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
/* OVERVIEW */
.big-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.bm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.bm.clickable{cursor:pointer;transition:all .18s}
.bm.clickable:hover{border-color:var(--accent-mid);transform:translateY(-1px)}
.bm.active-filter{border-color:var(--accent);background:var(--accent-light)}
.filter-label{font-size:10px;color:var(--accent);font-weight:500;margin-top:4px;display:none}
.bm.active-filter .filter-label{display:block}
.overview-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;min-height:28px}
.filter-pill{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border-md);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.filter-pill:hover{border-color:var(--accent-mid);color:var(--accent)}
.filter-pill .pill-x{font-size:14px;line-height:1;color:var(--text3)}
.no-results{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;grid-column:1/-1}
.bm-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.bm-val{font-size:22px;font-weight:500}
.bm-sub{font-size:11px;margin-top:3px}
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .2s}
.ov-card:hover{border-color:var(--accent-mid);transform:translateY(-1px)}
.ov-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ov-prog-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:8px}
.ov-prog-fill{height:100%;border-radius:2px}
.ov-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
/* REPORTS */
.report-output{background:var(--surface2);border-radius:var(--radius);padding:14px;font-size:13px;line-height:1.7;min-height:80px;white-space:pre-wrap;color:var(--text);margin-top:12px}
.report-output.empty{color:var(--text3);font-style:italic}
.row-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.row-controls select,.modal select{padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12.5px;background:var(--surface2);color:var(--text);outline:none}
.copy-btn{padding:7px 14px;background:var(--surface2);color:var(--text2);border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12px;cursor:pointer;margin-top:8px}
/* MEETING */
.meeting-ta,.li-prompt-area{width:100%;min-height:90px;padding:10px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:var(--font);font-size:12.5px;background:var(--surface2);color:var(--text);resize:vertical;line-height:1.5;outline:none;margin-bottom:10px}
.meeting-ta:focus,.li-prompt-area:focus{border-color:var(--accent)}
.action-card{display:flex;gap:8px;padding:9px;background:var(--surface2);border-radius:var(--radius);margin-bottom:6px}
.ac-num{width:20px;height:20px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
/* LINKEDIN */
.li-preview{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-top:14px}
.preset-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.preset-btn{font-size:11.5px;padding:5px 11px;border:1px solid var(--border-md);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s}
.preset-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent-mid)}
.section-view{display:none}
.section-view.active{display:block}
@media(max-width:700px){.three-col,.two-col,.metrics-row,.big-metrics,.overview-grid{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<aside class="sidebar">
  <div style="background:#5b4fcf;color:white;font-size:10px;text-align:center;padding:5px;font-family:monospace;letter-spacing:.05em;font-weight:bold">
  ProjectAI v4 — LOCAL ENGINE ACTIVE
</div>
<div class="sidebar-header">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 20 20"><polyline points="2,14 7,9 11,13 18,6"/><circle cx="18" cy="6" r="2" fill="white" stroke="none"/></svg></div>
      <div class="logo-name">ProjectAI</div>
    </div>
    <div class="logo-tag">Intelligent PM platform</div>
  </div>
  <div class="sidebar-section">Workspace</div>
  <div style="padding:0 8px 4px"><button class="overview-btn active" id="overviewBtn" onclick="showOverview()">All projects overview</button></div>
  <div class="sidebar-section">Projects</div>
  <div class="proj-list" id="projList"></div>
  <button class="add-proj-btn" onclick="openModal('addProjModal')">
    <svg viewBox="0 0 16 16" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
    Add new project
  </button>
  <div class="sidebar-footer"><div style="font-size:10px;color:var(--text3);text-align:center;font-family:var(--mono)">Powered by Claude AI</div></div>
</aside>

<main class="main">
  <div class="main-header">
    <div><div class="main-title" id="mainTitle">All projects</div><div class="main-sub" id="mainSub">Workspace overview</div></div>
    <div class="header-tabs" id="headerTabs" style="display:none">
      <button class="htab active" onclick="switchTab('dashboard',this)">Dashboard</button>
      <button class="htab" onclick="switchTab('assistant',this)">AI assistant</button>
      <button class="htab" onclick="switchTab('reports',this)">Status reports</button>
      <button class="htab" onclick="switchTab('meeting',this)">Meeting AI</button>
      <button class="htab" onclick="switchTab('linkedin',this)">LinkedIn post</button>
    </div>
  </div>
  <div class="main-body">
    <div id="view-overview" class="section-view active">
      <div class="big-metrics" id="overviewMetrics"></div>
      <div class="overview-filter-bar" id="filterBar"></div>
      <div class="overview-grid" id="overviewGrid"></div>
    </div>
    <div id="view-project" class="section-view">
      <div id="tab-dashboard"></div>
      <div id="tab-assistant" style="display:none"></div>
      <div id="tab-reports" style="display:none"></div>
      <div id="tab-meeting" style="display:none"></div>
      <div id="tab-linkedin" style="display:none"></div>
    </div>
  </div>
</main>

<!-- ADD PROJECT MODAL -->
<div class="modal-overlay" id="addProjModal">
  <div class="modal">
    <h3>Add new project</h3>
    <label>Project name</label><input id="npName" placeholder="e.g. Fashion App"/>
    <label>Description</label><input id="npDesc" placeholder="Brief description"/>
    <label>Status</label>
    <select id="npStatus"><option value="on-track">On track</option><option value="at-risk">At risk</option><option value="behind">Behind schedule</option><option value="completed">Completed</option></select>
    <label>Progress (%)</label><input id="npProgress" type="number" min="0" max="100" value="0"/>
    <label>Team lead</label><input id="npLead" placeholder="e.g. Tanvi S."/>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('addProjModal')">Cancel</button><button class="btn-primary" onclick="addProject()">Add project</button></div>
  </div>
</div>

<!-- TASK DETAIL MODAL (pop-out) -->
<div class="modal-overlay" id="taskModal">
  <div class="modal" style="width:540px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 id="tmTitle" style="margin:0"></h3>
      <button class="btn-danger" id="tmDeleteBtn">Delete task</button>
    </div>
    <label>Task name</label><input id="tmName"/>
    <label>Owner initials</label><input id="tmOwner" style="width:80px"/>
    <label>Due date</label><input id="tmDue" placeholder="e.g. 5/15"/>
    <label>Capacity (hours)</label><input id="tmHours" type="number" min="0"/>
    <label>Status</label>
    <select id="tmStatus"><option value="pending">Pending</option><option value="done">Done</option></select>
    <label>Story points</label>
    <input id="tmStoryPoints" type="number" min="0" max="100" placeholder="e.g. 3" style="width:100px"/>
    <label>User story</label>
    <textarea id="tmStory" placeholder="As a [user] I want to [action] so that [benefit]..."></textarea>
    <label>Description / Notes</label>
    <textarea id="tmDesc" placeholder="Task details, acceptance criteria, links..."></textarea>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('taskModal')">Cancel</button><button class="btn-primary" onclick="saveTask()">Save changes</button></div>
  </div>
</div>

<!-- RISK EDIT MODAL -->
<div class="modal-overlay" id="riskModal">
  <div class="modal" style="width:420px">
    <h3 id="rmTitle">Edit risk</h3>
    <label>Risk description</label><input id="rmText"/>
    <label>Severity</label>

let currentProjectId=null,currentTab='dashboard',activeFilter=null;
const chatHistory={};     // {projId: [{role,text}]}
const convContext={};    // {projId: {lastTaskId, lastRiskId, lastMemberId, lastAction}}

function getCtx(projId){
  if(!convContext[projId]) convContext[projId]={lastTaskId:null,lastRiskId:null,lastMemberId:null,lastAction:null,pendingAction:null,pendingData:null};
  return convContext[projId];
}
function setCtx(projId,updates){
  const ctx=getCtx(projId);
  Object.assign(ctx,updates);
}
let editingTaskId=null,editingRiskId=null,editingMemberId=null;

function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function getProject(id){return projects.find(p=>p.id===id)}
function statusColor(s){return s==='on-track'?'#16a374':s==='at-risk'?'#d97706':s==='behind'?'#dc2626':'#6b7280'}
function statusBg(s){return s==='on-track'?'#f0fdf4':s==='at-risk'?'#fffbeb':s==='behind'?'#fef2f2':'#f9fafb'}
function statusLabel(s){return s==='on-track'?'On track':s==='at-risk'?'At risk':s==='behind'?'Behind':'Completed'}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// Close dropdown when clicking outside
document.addEventListener('click',e=>{
  if(!e.target.closest('.ellipsis-btn')) document.querySelectorAll('.dropdown.open').forEach(d=>d.classList.remove('open'));
});
function toggleDD(id,e){e.stopPropagation();const d=document.getElementById(id);document.querySelectorAll('.dropdown.open').forEach(x=>{if(x!==d)x.classList.remove('open')});d.classList.toggle('open')}

// ── SIDEBAR ──────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('projList');
  list.innerHTML='';
  projects.forEach(p=>{
    const el=document.createElement('div');
    el.className='proj-item'+(currentProjectId===p.id?' active':'');
    el.onclick=()=>openProject(p.id);
    el.innerHTML=`<div class="proj-dot" style="background:${p.color}"></div><span class="proj-item-name">${p.name}</span><span class="proj-badge">${p.progress}%</span>`;
    list.appendChild(el);
  });
}

// ── OVERVIEW ─────────────────────────────────────────
function showOverview(){
  currentProjectId=null;
  document.getElementById('view-overview').classList.add('active');
  document.getElementById('view-project').classList.remove('active');
  document.getElementById('headerTabs').style.display='none';
  document.getElementById('mainTitle').textContent='All projects';
  document.getElementById('mainSub').textContent='Workspace overview';
  document.getElementById('overviewBtn').classList.add('active');
  renderSidebar();renderOverview();
}
function setFilter(filter){
  activeFilter = activeFilter===filter ? null : filter;
  renderOverview();
}

function renderOverview(){
  const total=projects.length;
  const onTrack=projects.filter(p=>p.status==='on-track'||p.status==='completed').length;
  const atRisk=projects.filter(p=>p.status==='at-risk'||p.status==='behind').length;
  const avgProg=total?Math.round(projects.reduce((s,p)=>s+p.progress,0)/total):0;

  // Metric cards — clickable with active state
  document.getElementById('overviewMetrics').innerHTML=`
    <div class="bm clickable ${activeFilter===null?'':''}${activeFilter==='all'?'active-filter':''}" onclick="setFilter('all')">
      <div class="bm-label">Total projects</div><div class="bm-val">${total}</div>
      <div class="filter-label">Showing all</div>
    </div>
    <div class="bm clickable ${activeFilter==='on-track'?'active-filter':''}" onclick="setFilter('on-track')">
      <div class="bm-label">On track</div><div class="bm-val" style="color:#16a374">${onTrack}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">Click to filter</div>
      <div class="filter-label">Filtered ✓</div>
    </div>
    <div class="bm clickable ${activeFilter==='at-risk'?'active-filter':''}" onclick="setFilter('at-risk')">
      <div class="bm-label">Need attention</div><div class="bm-val" style="color:#d97706">${atRisk}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">Click to filter</div>
      <div class="filter-label">Filtered ✓</div>
    </div>
    <div class="bm clickable ${activeFilter==='completed'?'active-filter':''}" onclick="setFilter('completed')">
      <div class="bm-label">Avg progress</div><div class="bm-val">${avgProg}%</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">Across all projects</div>
    </div>`;

  // Filter bar pill
  const filterBar=document.getElementById('filterBar');
  if(activeFilter && activeFilter!=='all'){
    const labels={'on-track':'On track','at-risk':'Needs attention','completed':'Completed'};
    filterBar.innerHTML=`<span style="font-size:12px;color:var(--text3)">Filtering by:</span>
      <div class="filter-pill">
        <span>${labels[activeFilter]||activeFilter}</span>
        <span class="pill-x" onclick="setFilter(null)">×</span>
      </div>
      <span style="font-size:12px;color:var(--text3)">${getFiltered().length} project${getFiltered().length!==1?'s':''}</span>`;
  } else {
    filterBar.innerHTML='';
  }

  // Grid
  const grid=document.getElementById('overviewGrid');
  grid.innerHTML='';
  const filtered=getFiltered();
  if(filtered.length===0){
    grid.innerHTML='<div class="no-results">No projects match this filter.</div>';
    return;
  }
  filtered.forEach(p=>{
    const el=document.createElement('div');
    el.className='ov-card';
    el.onclick=()=>openProject(p.id);
    el.innerHTML=`
      <div class="ov-card-header">
        <div class="proj-dot" style="background:${p.color};width:10px;height:10px"></div>
        <span style="flex:1;font-size:13px;font-weight:500">${p.name}</span>
        <span style="font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;background:${statusBg(p.status)};color:${statusColor(p.status)}">${statusLabel(p.status)}</span>
      </div>
      <div class="ov-prog-bar"><div class="ov-prog-fill" style="width:${p.progress}%;background:${p.color}"></div></div>
      <div class="ov-meta"><span>Lead: ${p.lead}</span><span>${p.progress}%</span></div>`;
    grid.appendChild(el);
  });
}

function getFiltered(){
  if(!activeFilter || activeFilter==='all') return projects;
  if(activeFilter==='on-track') return projects.filter(p=>p.status==='on-track'||p.status==='completed');
  if(activeFilter==='at-risk') return projects.filter(p=>p.status==='at-risk'||p.status==='behind');
  return projects.filter(p=>p.status===activeFilter);
}

function openProject(id){
  currentProjectId=id;const p=getProject(id);
  document.getElementById('view-overview').classList.remove('active');
  document.getElementById('view-project').classList.add('active');
  document.getElementById('headerTabs').style.display='flex';
  document.getElementById('mainTitle').textContent=p.name;
  document.getElementById('mainSub').textContent=p.desc+' · '+statusLabel(p.status);
  document.getElementById('overviewBtn').classList.remove('active');
  renderSidebar();switchTab('dashboard',document.querySelector('.htab'));
}

function switchTab(tab,btn){
  currentTab=tab;
  ['dashboard','assistant','reports','meeting','linkedin'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');
  document.querySelectorAll('.htab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const p=getProject(currentProjectId);if(!p)return;
  if(tab==='dashboard')renderDashboard(p);
  else if(tab==='assistant')renderAssistant(p);
  else if(tab==='reports')renderReports(p);
  else if(tab==='meeting')renderMeeting(p);
  else if(tab==='linkedin')renderLinkedIn(p);
}

// ── CAPACITY BAR ─────────────────────────────────────
function renderCapacityBar(p){
  const active=p.team.filter(m=>!m.onLeave);
  const onLeave=p.team.filter(m=>m.onLeave);
  const totalHrs=p.team.reduce((s,m)=>s+(m.hours||0),0);
  const activeHrs=active.reduce((s,m)=>s+(m.hours||0),0);
  const avgLoad=active.length?Math.round(active.reduce((s,m)=>s+m.load,0)/active.length):0;
  const color=avgLoad>85?'#dc2626':avgLoad>70?'#d97706':'#16a374';
  return `<div class="capacity-bar">
    <span class="cap-label">Team capacity</span>
    <div class="cap-track"><div class="cap-fill" style="width:${avgLoad}%;background:${color}"></div></div>
    <span class="cap-stat" style="color:${color}">${avgLoad}% avg load</span>
    <span style="font-size:12px;color:var(--text3)">${activeHrs}h allocated · ${active.length} active${onLeave.length?' · '+onLeave.length+' on leave':''}</span>
    <div class="cap-members">${p.team.map(m=>`<div class="cap-member"><div class="cap-av" style="background:${m.color};color:var(--text)">${m.initials}</div>${m.name.split(' ')[0]}${m.onLeave?' <span class="on-leave">leave</span>':''}</div>`).join('')}</div>
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────
function renderDashboard(p){
  const el=document.getElementById('tab-dashboard');
  const totalHrs=p.tasks.reduce((s,t)=>s+(t.hours||0),0);
  const doneHrs=p.tasks.filter(t=>t.done).reduce((s,t)=>s+(t.hours||0),0);
  const statuses=[
    {label:'Progress',val:p.progress+'%',sub:statusLabel(p.status),color:statusColor(p.status)},
    {label:'Tasks done',val:p.tasks.filter(t=>t.done).length+'/'+p.tasks.length,sub:'Completed',color:'var(--text)'},
    {label:'Hours logged',val:doneHrs+'h',sub:'of '+totalHrs+'h total',color:'var(--text)'},
    {label:'Open risks',val:p.risks.filter(r=>r.level==='High').length,sub:p.risks.length+' total risks',color:p.risks.some(r=>r.level==='High')?'#dc2626':'#16a374'}
  ];
  el.innerHTML=renderCapacityBar(p)+`
  <div class="metrics-row">${statuses.map(s=>`<div class="metric-card"><div class="mc-label">${s.label}</div><div class="mc-val" style="color:${s.color}">${s.val}</div><div class="mc-sub">${s.sub}</div></div>`).join('')}</div>
  <div class="two-col">
    <div class="card">
      <div class="card-title-row"><span class="card-title">Progress & insights</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12.5px">${p.name}</span><span style="font-size:11px;color:var(--text3)">${p.progress}%</span></div>
      <div style="height:4px;background:var(--surface2);border-radius:2px;margin-bottom:12px"><div style="height:100%;border-radius:2px;width:${p.progress}%;background:${p.color}"></div></div>
      ${p.status==='behind'?'<div class="insight-item ins-w"><div class="ii-icon">!</div><div><div class="ii-text">Project is behind schedule</div><div class="ii-sub">Consider reallocating resources</div></div></div>':''}
      ${p.status==='on-track'?'<div class="insight-item ins-g"><div class="ii-icon">✓</div><div><div class="ii-text">Project is on track</div><div class="ii-sub">Maintain current velocity</div></div></div>':''}
      ${p.risks.some(r=>r.level==='High')?`<div class="insight-item ins-w"><div class="ii-icon">!</div><div><div class="ii-text">${p.risks.filter(r=>r.level==='High').length} high-priority risks</div><div class="ii-sub">${p.risks.find(r=>r.level==='High').text}</div></div></div>`:''}
      <div class="insight-item ins-b"><div class="ii-icon">★</div><div><div class="ii-text">${p.tasks.filter(t=>t.done).length}/${p.tasks.length} tasks done · ${doneHrs}h of ${totalHrs}h delivered</div></div></div>
    </div>
    <div class="card" id="dash-notes-${p.id}">
      <div class="card-title-row"><span class="card-title">Stakeholder notes</span></div>
      ${p.notes&&p.notes.length?p.notes.map(n=>`<div style="padding:7px 0;border-bottom:1px solid var(--border)"><div style="display:flex;gap:6px;margin-bottom:3px"><span style="font-size:10px;padding:1px 7px;border-radius:5px;background:#eff6ff;color:#1e40af;font-weight:500">${n.category}</span><span style="font-size:11px;color:var(--text3)">${n.date}</span></div><div style="font-size:12.5px;font-weight:500">${n.title}</div><div style="font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5">${n.content}</div></div>`).join(''):'<div style="font-size:12px;color:var(--text3);padding:8px 0">No notes yet. Ask the AI assistant to record stakeholder feedback.</div>'}
    </div>
  </div>
  <div class="three-col">
    ${renderTasksCard(p)}
    ${renderRisksCard(p)}
    ${renderTeamCard(p)}
  </div>`;
}

function renderTasksCard(p){
  const totalSP=p.tasks.reduce((s,t)=>s+(t.storyPoints||0),0);
  return `<div class="card" id="tasks-card-${p.id}">
    <div class="card-title-row">
      <span class="card-title">Tasks (${p.tasks.length}) · ${p.tasks.reduce((s,t)=>s+(t.hours||0),0)}h${totalSP?' · '+totalSP+' pts':''}</span>
      <div style="display:flex;gap:4px;align-items:center">
        <div style="position:relative">
          <button class="ellipsis-btn" onclick="toggleDD('task-dd-${p.id}',event)" title="Task options">···</button>
          <div class="dropdown" id="task-dd-${p.id}">
            <div class="dd-item" onclick="openAddTaskModal(${p.id});closeModal('task-dd-${p.id}')">+ Add new task</div>

            <div class="dd-item" onclick="clearDoneTasks(${p.id})">Clear completed</div>
          </div>
        </div>
      </div>
    </div>
    ${p.tasks.map(t=>`
    <div class="task-row" onclick="openTaskModal(${p.id},'${t.id}')">

      <div class="task-main">
        <div class="task-name-text ${t.done?'done':''}">${t.text}</div>
        <div class="task-chips">
          ${t.due_date?`<span class="chip-sm" style="background:#f0fdf4;color:#166534">Due ${t.due_date}</span>`:''}
          ${t.hours?`<span class="chip-sm" style="background:#eff6ff;color:#1e40af">${t.hours}h</span>`:''}
          ${t.storyPoints?`<span class="chip-sm" style="background:#f3f0ff;color:#5b21b6">${t.storyPoints} pts</span>`:''}
          ${t.story?`<span class="chip-sm" style="background:#fef9c3;color:#92400e">Story</span>`:''}
        </div>
      </div>
      <div class="task-av" style="background:#f3f0ff;color:var(--accent)">${t.owner}</div>
    </div>`).join('')}
    ${p.tasks.length===0?'<div style="font-size:12px;color:var(--text3);padding:10px 0;text-align:center">No tasks yet</div>':''}

  </div>`;
}

function renderRisksCard(p){
  return `<div class="card" id="risks-card-${p.id}">
    <div class="card-title-row">
      <span class="card-title">Risk radar (${p.risks.length})</span>
      <div style="position:relative">
        <button class="ellipsis-btn" onclick="toggleDD('risk-dd-${p.id}',event)">···</button>

// ── INTENT ENGINE ─────────────────────────────────────
function applyIntent(p,action,data){
  if(action==='add_task'){
    const ownerInitials=(data.owner||'TL').trim().split(/\s+/).filter(w=>w).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'TL';
    p.tasks.push({id:uid(),text:data.text,done:false,owner:ownerInitials,due_date:data.due_date||'',hours:data.hours||null,storyPoints:data.storyPoints||null,story:data.story||'',description:data.description||''});
    return `Task added: "${data.text}"${data.due_date?' · due '+data.due_date:''}${data.hours?' · '+data.hours+'h':''}`;
  }
  if(action==='complete_task'){
    const t=p.tasks.find(t=>t.text.toLowerCase().includes(data.name.toLowerCase()));
    if(t){t.done=data.done;return `Task "${t.text}" marked as ${data.done?'done':'pending'}.`;}
    return `Task matching "${data.name}" not found. Tasks: ${p.tasks.map(t=>'"'+t.text.slice(0,25)+'"').join(', ')}`;
  }
  if(action==='add_risk'){p.risks.push({id:uid(),level:data.level,text:data.text});return `Risk added [${data.level}]: "${data.text}"`;}
  if(action==='edit_risk'){const r=p.risks.find(r=>r.text.toLowerCase().includes(data.name.toLowerCase()));if(r){if(data.level)r.level=data.level;if(data.text)r.text=data.text;return `Risk updated.`;}return 'Risk not found.';}
  if(action==='add_member'){p.team.push({id:uid(),name:data.name,initials:(data.initials||data.name.trim().split(/\s+/).map(w=>w[0]).join('')).toUpperCase().slice(0,2),role:data.role||'',load:data.load||70,hours:data.hours||40,onLeave:data.onLeave||false,leaveDates:data.leaveDates||'',notes:data.notes||'',color:'#ede9fe'});return `Team member ${data.name} added.`;}
  if(action==='member_leave'){const m=p.team.find(m=>m.name.toLowerCase().includes(data.name.toLowerCase()));if(m){m.onLeave=data.onLeave;if(data.leaveDates)m.leaveDates=data.leaveDates;return `${m.name} ${data.onLeave?'marked on leave'+( data.leaveDates?' ('+data.leaveDates+')':''):' marked active'}.`;}return 'Member not found.';}
  if(action==='update_progress'){p.progress=Math.min(100,Math.max(0,data.value));return `Progress updated to ${p.progress}%.`;}
  if(action==='add_note'){if(!p.notes)p.notes=[];p.notes.push({title:data.title,content:data.content,category:data.category||'stakeholder',date:new Date().toLocaleDateString()});return `Note recorded: "${data.title}".`;}
  return null;
}


// ── HELPER: resolve "this task" / "that task" / "the last task" via context ──
function resolveTask(p,q,projId){
  const ql=q.toLowerCase();
  const ctx=getCtx(projId);
  // Pronoun references → use last touched task
  if(/\b(this|that|the)\s+(task|one)\b|^it\b/i.test(ql)){
    if(ctx.lastTaskId){
      const t=p.tasks.find(t=>t.id===ctx.lastTaskId);
      if(t) return t;
    }
    // Fall back to last task in list
    return p.tasks[p.tasks.length-1]||null;
  }
  // Named task match
  const named=p.tasks.find(t=>t.text.toLowerCase().includes(ql.replace(/update|task|the|for|to|assign|add|mark|done|story|points?/gi,'').trim().slice(0,30)));
  return named||null;
}

// ── HELPER: resolve person name → always use "FirstName LastName" → initials ──
function makeInitials(name){
  return name.trim().split(/\s+/).filter(w=>w).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
}

// ── HELPER: find member by name, or auto-create them ─────────────────
function resolveOrCreateMember(p,name,projId){
  if(!name) return null;
  const nl=name.toLowerCase();
  // Try to find existing member
  let m=p.team.find(m=>m.name.toLowerCase()===nl||
    m.name.toLowerCase().includes(nl)||
    nl.includes(m.name.toLowerCase().split(' ')[0].toLowerCase()));
  if(m) return {member:m,created:false};
  // Auto-create new member
  const initials=makeInitials(name);
  const newMember={id:uid(),name,initials,role:'',load:70,hours:40,onLeave:false,leaveDates:'',notes:'',color:'#ede9fe'};
  p.team.push(newMember);
  setCtx(projId,{lastMemberId:newMember.id});
  return {member:newMember,created:true};
}

// ── MAIN INTENT PARSER ────────────────────────────────────────────────
function parseAndApply(p,q,projId){
  const msgs=[];
  const ql=q.toLowerCase();
  const ctx=getCtx(projId);

  // ── PRE-PASS: extract person name from multiple phrasings ────────────
  // "his/her name is X", "named X", "called X", "owner as X", "owner: X"
  function extractPersonName(q){
    // [A-Za-z.]* (not +) allows single-char last names like "Josh S"
    const m=(
      q.match(/(?:his|her|their)\s+name\s+is\s+([A-Za-z]+(?:\s+[A-Za-z.]*[A-Za-z])*)\s*(?:$|,|\.|;)/i)||
      q.match(/(?:new\s+)?owner\s+(?:as\s+|is\s+|:\s*)([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)/i)||
      q.match(/assign\s+(?:\w+\s+){0,6}to\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s*(?:$|,|\.|\s+(?:he|she|they)\b)/i)||
      q.match(/to\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)\s*(?:$|,|\.|\s+(?:he|she|they|is|as|and)\b)/i)||
      q.match(/named\s+([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)/i)||
      q.match(/name\s*:\s*([A-Z][a-z]+(?:\s+[A-Z][a-z.]*)?)/i)
    );
    return m?m[1].trim():null;
  }

  // ── PRE-PASS: resolve which task is referenced ───────────────────────
  function resolveTargetTask(q){
    const ql=q.toLowerCase();
    // Pronoun / recency references
    if(/\b(this|that|the\s+(?:new(?:ly)?|last|above|same))\s+(?:one\s+)?task|it\s+to\s+|newly\s+created|just\s+added/i.test(q)){
      if(ctx.lastTaskId){
        const t=p.tasks.find(t=>t.id===ctx.lastTaskId);
        if(t) return t;
      }
      return p.tasks[p.tasks.length-1]||null;
    }
    // Named task: find best match by removing noise words
    const noise=/\b(update|task|the|for|to|assign|add|mark|done|story|points?|new|owner|as|with|get|requirements?|design)\b/gi;
    const cleaned=ql.replace(noise,' ').replace(/\s+/g,' ').trim();
    if(cleaned.length>3){
      const found=p.tasks.find(t=>t.text.toLowerCase().includes(cleaned.slice(0,20)));
      if(found) return found;
      // Partial word match
      const words=cleaned.split(' ').filter(w=>w.length>3);
      for(const w of words){
        const f=p.tasks.find(t=>t.text.toLowerCase().includes(w));
        if(f) return f;
      }
    }
    return null;
  }

  // ── 1. UPDATE OWNER / REASSIGN ───────────────────────────────────────
  // Catches: "update X task with new owner as Josh S", "change owner to Josh S",
  //          "assign the newly created task to him, his name is Josh S"
  if(/(?:new\s+)?owner\s+(?:as|is|:)|change\s+(?:the\s+)?owner|reassign|update.{0,40}owner/i.test(q)||
     ((/assign|to\s+him|to\s+her/i.test(q))&&/name\s+is/i.test(q))){
    const nameMatch=extractPersonName(q);
    const person=nameMatch?nameMatch[1].trim():'';
    if(person){
      const result=resolveOrCreateMember(p,person,projId);
      const initials=result.member.initials;
      let t=resolveTargetTask(q);
      if(!t&&p.tasks.length===1) t=p.tasks[0];
      if(t){
        t.owner=initials;
        setCtx(projId,{lastTaskId:t.id,lastMemberId:result.member.id,lastAction:'assign'});
        msgs.push('Task "'+t.text+'" owner updated to '+person+' ('+initials+').'+(result.created?' '+person+' added as new team member.':''));
      } else if(p.tasks.length>1){
        msgs.push('Which task should I reassign to '+person+'? Tasks: '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,30)+'"').join(', '));
      }
    } else {
      msgs.push('Please specify the new owner name. E.g. "Update task X with new owner as Josh S"');
    }
  }

  // ── 2. CREATE MEMBER + ASSIGN (combined intent) ──────────────────────
  // "create a new member and assign the task to him, his name is Josh S"
  else if(/create.{0,20}member|add.{0,20}member.{0,50}assign|assign.{0,50}member/i.test(q)){
    const nameMatch=extractPersonName(q);
    const person=nameMatch?nameMatch[1].trim():'';
    if(person){
      const result=resolveOrCreateMember(p,person,projId);
      msgs.push(person+' ('+result.member.initials+') '+(result.created?'added as new team member':'already in team')+'.');
      // Also assign to last/referenced task
      let t=resolveTargetTask(q);
      if(!t&&ctx.lastTaskId) t=p.tasks.find(t=>t.id===ctx.lastTaskId);
      if(!t&&p.tasks.length===1) t=p.tasks[0];
      if(t){
        t.owner=result.member.initials;
        setCtx(projId,{lastTaskId:t.id,lastMemberId:result.member.id,lastAction:'assign'});
        msgs.push('Task "'+t.text+'" assigned to '+person+' ('+result.member.initials+').');
      } else if(p.tasks.length>1){
        msgs.push('Which task should I assign to '+person+'? Tasks: '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,30)+'"').join(', '));
      }
    } else {
      msgs.push('Please provide the new member\'s name. E.g. "...his name is Josh S"');
    }
  }

  // ── 3. ASSIGN TASK (direct: "assign X to Y") ────────────────────────
  else if(/assign.{0,60}to\s+[A-Za-z]/i.test(q)&&!/create.{0,20}member/i.test(q)){
    const nameMatch=extractPersonName(q);
    const person=nameMatch?nameMatch[1].trim():'';
    if(person){
      const result=resolveOrCreateMember(p,person,projId);
      let t=resolveTargetTask(q);
      if(!t&&ctx.lastTaskId) t=p.tasks.find(t=>t.id===ctx.lastTaskId);
      if(!t&&p.tasks.length===1) t=p.tasks[0];
      if(t){
        t.owner=result.member.initials;
        setCtx(projId,{lastTaskId:t.id,lastMemberId:result.member.id,lastAction:'assign'});
        msgs.push('Task "'+t.text+'" assigned to '+person+' ('+result.member.initials+').'+(result.created?' '+person+' added as new team member.':''));
      } else if(p.tasks.length>1){
        msgs.push('Which task? Tasks: '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,30)+'"').join(', '));
      }
    } else {
      msgs.push('Who should I assign the task to? E.g. "Assign this task to Josh S"');
    }
  }

  // ── 4. ADD TASK ──────────────────────────────────────────────────────
  else if(/add.{0,25}task|new task|create task/i.test(q)){
    const obj=parseTask(q);
    if(obj.ownerName&&obj.ownerName!=='TL'){
      const result=resolveOrCreateMember(p,obj.ownerName,projId);
      obj.owner=result.member.initials;
      if(result.created) msgs.push(obj.ownerName+' ('+result.member.initials+') added as new team member.');
    }
    const newId=uid();
    p.tasks.push({id:newId,text:obj.text,done:false,owner:obj.owner,due_date:obj.due_date||'',
      hours:obj.hours||null,storyPoints:obj.storyPoints||null,story:obj.story||'',description:obj.description||''});
    setCtx(projId,{lastTaskId:newId,lastAction:'add_task'});
    const details=[];
    if(obj.due_date) details.push('due '+obj.due_date);
    if(obj.hours) details.push(obj.hours+'h');
    if(obj.storyPoints) details.push(obj.storyPoints+' pts');
    msgs.push('Task added: "'+obj.text+'"'+(details.length?' ('+details.join(', ')+')':'')+'.');
  }

  // ── 5. STORY POINTS ──────────────────────────────────────────────────
  else if(/story\s*points?|update.{0,20}points?|points?\s*(for|to|is|are)\s*\d|^\s*\d+\s*(?:story\s*)?points?/i.test(q)){
    const pts=q.match(/(\d+)\s*(?:story\s*)?points?/i);
    if(pts){
      let t=resolveTargetTask(q);
      if(!t&&ctx.lastTaskId) t=p.tasks.find(t=>t.id===ctx.lastTaskId);
      if(!t&&p.tasks.length===1) t=p.tasks[0];
      if(t){
        t.storyPoints=parseInt(pts[1]);
        setCtx(projId,{lastTaskId:t.id,lastAction:'story_points'});
        msgs.push('Story points for "'+t.text+'" set to '+pts[1]+'.');
      } else if(p.tasks.length>1){
        msgs.push('Which task? Tasks: '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,30)+'"').join(', '));
      }
    }
  }

  // ── 6. MARK DONE ─────────────────────────────────────────────────────
  else if(/\b(mark|complete|finish|close)\b.{0,60}\b(done|complete[d]?|finished)\b/i.test(q)){
    let t=resolveTargetTask(q);
    if(!t&&ctx.lastTaskId) t=p.tasks.find(t=>t.id===ctx.lastTaskId);
    if(!t&&p.tasks.length===1) t=p.tasks[0];
    if(t){
      t.done=true;
      setCtx(projId,{lastTaskId:t.id,lastAction:'complete'});
      msgs.push('Task "'+t.text+'" marked as done.');
    } else if(p.tasks.length>1){
      msgs.push('Which task? Pending: '+p.tasks.filter(t=>!t.done).map((t,i)=>(i+1)+'. "'+t.text.slice(0,30)+'"').join(', '));
    }
  }

  // ── 7. UPDATE TASK DESCRIPTION ───────────────────────────────────────
  else if(/update.{0,20}task|add.{0,20}(?:note|description|detail)/i.test(q)&&
          !/add.{0,25}task|new task|create task/i.test(q)){
    const pct=q.match(/(\d+)\s*%/);
    if(pct) msgs.push(applyIntent(p,'update_progress',{value:parseInt(pct[1])})||'');
    let t=resolveTargetTask(q);
    if(!t&&ctx.lastTaskId) t=p.tasks.find(t=>t.id===ctx.lastTaskId);
    if(!t&&p.tasks.length===1) t=p.tasks[0];
    if(t){
      const noteMatch=q.match(/(?:with\s+|:\s+|—\s*)(.{10,})/i);
      if(noteMatch&&!/owner|progress|%/i.test(noteMatch[1]))
        t.description=(t.description?t.description+'\n':'')+noteMatch[1].trim();
      setCtx(projId,{lastTaskId:t.id,lastAction:'update_task'});
      msgs.push('Task "'+t.text+'" updated.');
    } else if(!pct){
      msgs.push('Which task? Tasks: '+p.tasks.map((t,i)=>(i+1)+'. "'+t.text.slice(0,30)+'"').join(', '));
    }
  }

  // ── 8. UPDATE PROGRESS ───────────────────────────────────────────────
  else if(/progress.{0,20}\d+\s*%|\d+\s*%.{0,20}progress|update.{0,15}progress|set.{0,15}progress/i.test(q)){
    const pct=q.match(/(\d+)\s*%/);
    if(pct) msgs.push(applyIntent(p,'update_progress',{value:parseInt(pct[1])})||'');
  }

  // ── 9. ADD RISK ───────────────────────────────────────────────────────
  else if(/add.{0,15}risk|new risk|record.*risk/i.test(q)){
    const lvl=/high/i.test(q)?'High':/low/i.test(q)?'Low':'Med';
    const txt=q.replace(/add\s+(a\s+)?(high|med|medium|low)?\s*risk[:\s-]*/i,'').trim();
    msgs.push(applyIntent(p,'add_risk',{level:lvl,text:txt})||'');
    setCtx(projId,{lastAction:'add_risk'});
  }

  // ── 10. ON LEAVE ─────────────────────────────────────────────────────
  else if(/on leave|going on leave|out of office|pto/i.test(q)){
    const nm=q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)\s+(?:is\s+)?(?:on\s+leave|going\s+on|out\s+of\s+office)/i)||
             q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)\s+(?:will\s+be\s+)?on\s+leave/i);
    const dm=q.match(/(\w+\s*\d+\s*[-to]+\s*\w*\s*\d*)/i);
    const name=nm?nm[1].trim():'';
    if(name){
      const result=resolveOrCreateMember(p,name,projId);
      result.member.onLeave=true;
      if(dm) result.member.leaveDates=dm[1].trim();
      msgs.push(name+' marked on leave'+(dm?' ('+dm[1]+')':'')+'.');
    } else msgs.push('Specify who is on leave. E.g. "Josh S is on leave May 10-20"');
  }

  // ── 11. RETURN FROM LEAVE ────────────────────────────────────────────
  else if(/back from leave|returned|no longer on leave|active again/i.test(q)){
    const nm=q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)\s+(?:is\s+)?(?:back|returned|active)/i);
    if(nm){const result=resolveOrCreateMember(p,nm[1].trim(),projId);result.member.onLeave=false;msgs.push(nm[1]+' marked active.');}
  }

  // ── 12. ADD TEAM MEMBER ───────────────────────────────────────────────
  else if(/add.{0,15}(?:team\s+)?member|new\s+member|add.{0,15}teammate/i.test(q)){
    const nm=q.match(/(?:add\s+(?:team\s+)?member[:\s]+)([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)/i)||
             q.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)\s+as\s+(?:new\s+)?(?:team\s+)?member/i)||
             q.match(/(?:add|new)\s+(?:team\s+)?member[:\s]+([A-Z][a-z]+(?:\s+[A-Z][a-z.]+)?)/i);
    const name=nm?nm[1].trim():'';
    if(name){
      const roleM=q.match(/(?:as|role[:\s]+)\s*([A-Za-z][A-Za-z ]+?)(?:,|\.|$|with|\d)/i);
      const hoursM=q.match(/(\d+)\s*(?:hours?|hrs?)/i);
      const loadM=q.match(/(\d+)\s*%/);
      const result=resolveOrCreateMember(p,name,projId);
      if(roleM) result.member.role=roleM[1].trim();
      if(hoursM) result.member.hours=parseInt(hoursM[1]);
      if(loadM) result.member.load=parseInt(loadM[1]);
      msgs.push(name+' ('+result.member.initials+') '+(result.created?'added to team':'already on team — updated')+'.');
    } else msgs.push('Provide the name: "Add team member: Josh S"');
  }

  // ── 13. STAKEHOLDER NOTE ─────────────────────────────────────────────
  else if(/stakeholder|feedback|note[:\s]|submit.*feedback/i.test(q)){
    const cat=q.match(/stakeholder/i)?'stakeholder':q.match(/feedback/i)?'feedback':'update';
    const title=q.replace(/^(submit|add|record)\s+(a\s+)?/i,'').split(/[.,]/)[0].slice(0,60);
    if(!p.notes) p.notes=[];
    p.notes.push({title,content:q,category:cat,date:new Date().toLocaleDateString()});
    msgs.push('Note recorded: "'+title+'".');
  }

  // ── 14. DELETE TASK ───────────────────────────────────────────────────
  else if(/delete.{0,15}task|remove.{0,15}task/i.test(q)){
    const nm=q.match(/(?:delete|remove)\s+(?:the\s+)?(?:task\s+)?(.+)/i);
    const t=nm?p.tasks.find(t=>t.text.toLowerCase().includes(nm[1].trim().toLowerCase().slice(0,30))):null;
    if(t){p.tasks=p.tasks.filter(tt=>tt.id!==t.id);msgs.push('Task "'+t.text+'" deleted.');}
    else msgs.push('Task not found.');
  }

  return msgs.filter(m=>m&&m.trim());
}

function parseTask(q){
  let text=q.replace(/^(add\s+(a\s+)?new\s+task[-:\s]*|add\s+task[-:\s]*|new\s+task[-:\s]*|create\s+task[-:\s]*)/i,'').trim();
  const dueM=text.match(/due\s*(?:date\s*)?[:\-]?\s*([\d\/]+|[a-z]+\s+\d+)/i);
  const due_date=dueM?dueM[1].trim():'';if(dueM)text=text.replace(dueM[0],'');
  const hrsM=text.match(/(\d+)\s*(?:hours?|hrs?)\b/i);
  const hours=hrsM?parseInt(hrsM[1]):null;if(hrsM)text=text.replace(hrsM[0],'');
  const spM=text.match(/(\d+)\s*(?:story\s*)?(?:points?|sp|pts?)\b/i);
  const storyPoints=spM?parseInt(spM[1]):null;if(spM)text=text.replace(spM[0],'');
  const ownM=text.match(/(?:owner|assigned?\s+to|assign)[:\s]+([A-Za-z]+(?:\s+[A-Za-z.]+)?)/i);
  const ownerName=ownM?ownM[1].trim():'';
  const owner=ownerName?makeInitials(ownerName):'TL';
  if(ownM)text=text.replace(ownM[0],'');
  const storyM=text.match(/(?:user\s+story|story)[:\s]+(.+?)(?=description:|desc:|capacity:|$)/is);
  const story=storyM?storyM[1].trim():'';if(storyM)text=text.replace(storyM[0],'');
  const descM=text.match(/(?:description|desc|notes?)[:\s]+(.+)/is);
  const description=descM?descM[1].replace(/,\s*(capacity|due|owner|story).*/i,'').trim():'';if(descM)text=text.replace(descM[0],'');
  text=text.replace(/,?\s*capacity\s*allocation\s*[:\-]?/gi,'').replace(/,\s*,/g,',').replace(/^[,\s\-]+|[,\s\-]+$/g,'').trim();
  return{text:text.split(/,(?!\s*\d)/)[0].trim()||q.slice(0,60),due_date,hours,storyPoints,ownerName,owner,story,description};
}


async function sendMsg(projId, prefill){
  const inputEl=document.getElementById('chatIn-'+projId);
  const btn=document.getElementById('sendBtn-'+projId);
  const q=(prefill||inputEl.value).trim();
  if(!q) return;
  if(!prefill) inputEl.value='';
  const p=getProject(parseInt(projId));
  const wrap=document.getElementById('chat-'+projId);
  if(!wrap) return;

  addChatMsg(wrap, q, 'user');
  const thinking=addChatMsg(wrap, '...', 'ai thinking');
  if(btn) btn.disabled=true;

  // Small delay so UI renders the "..." before processing
  await new Promise(r=>setTimeout(r,50));

  try{
    const result=localNLP(p, q, parseInt(projId));
    const reply=result.reply||'Got it!';
    thinking.textContent=reply;
    thinking.classList.remove('thinking');
    // Save final AI reply to history (not the "..." placeholder)
    if(!chatHistory[parseInt(projId)]) chatHistory[parseInt(projId)]=[];
    chatHistory[parseInt(projId)].push({role:'ai',text:reply});
    if(result.actions>0) showActionBadge(wrap, result.actions, p);
  }catch(e){
    console.error('localNLP error:', e);
    const errMsg='Sorry, something went wrong internally. Please try again.';
    thinking.textContent=errMsg;
    thinking.classList.remove('thinking');
    if(!chatHistory[parseInt(projId)]) chatHistory[parseInt(projId)]=[];
    chatHistory[parseInt(projId)].push({role:'ai',text:errMsg});
  }

  if(btn) btn.disabled=false;
}
